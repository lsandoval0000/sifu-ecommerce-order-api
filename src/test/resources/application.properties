# Quarkus Test Configuration with H2
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.database.version-check.enabled=false

# HTTP test port
quarkus.http.test-port=9999


# Kafka
kafka.bootstrap.servers=http://localhost:19092
kafka.schema-registry.url=http://localhost:8081

# Kafka Producer
kafka.producer.order-notification.topic=product-order-topic

# Kafka Consumer
kafka.consumer.order-notification.group-id=product-order-topic-cg-01
kafka.consumer.order-notification.client-id=product-order-topic-client